services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scancontact}
      POSTGRES_USER: ${POSTGRES_USER:-scancontact}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scancontact_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scancontact} -d ${POSTGRES_DB:-scancontact}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scancontact}:${POSTGRES_PASSWORD:-scancontact_local_password}@postgres:5432/${POSTGRES_DB:-scancontact}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - api_uploads:/app/apps/api/uploads

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/web/.env
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["production-proxy"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
  api_uploads:
  caddy_data:
  caddy_config:
