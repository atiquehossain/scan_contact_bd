<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Manual QR Entry - NoNumQR</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

                        "surface-container-highest": "#d8e3fb",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed-variant": "#005049",
                        "tertiary-fixed": "#dbe1ff",
                        "tertiary-container": "#0049c3",

                        "tertiary": "#003491",
                        "inverse-on-surface": "#ecf1ff",
                        "surface-container": "#e7eeff",
                        "secondary-fixed-dim": "#6bd8cb",
                        "on-secondary-fixed": "#00201d",
                        "primary": "#004532",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#006f66",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#dee8ff",
                        "on-primary-fixed": "#002116",

                        "on-tertiary-fixed-variant": "#003ea8",
                        "inverse-primary": "#8bd6b6",
                        "secondary-fixed": "#89f5e7",
                        "on-tertiary-fixed": "#00174b",
                        "surface": "#f9f9ff",
                        "on-primary-fixed-variant": "#00513b",
                        "secondary-container": "#86f2e4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",

                    "spacing": {
                        "gutter-mobile": "12px",
                        "xl": "32px",

                    },
                    "fontFamily": {

                    "fontSize": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f9f9ff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .tonal-layer {
            background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(248,250,252,1) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface antialiased">
<!-- Top App Bar -->
<!-- Applying Shared Component styles from JSON -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-container/80 backdrop-blur-xl shadow-sm flex items-center justify-between px-margin-mobile h-16 w-full">
<button class="transition-all duration-300 active:scale-95 p-2 rounded-full hover:bg-surface-variant/50" data-icon="arrow_back">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-on-surface">Manual Entry</h1>
<button class="transition-all duration-300 active:scale-95 p-2 rounded-full hover:bg-surface-variant/50" data-icon="shield">
<span class="material-symbols-outlined text-primary">shield</span>
</button>
</header>
<main class="pt-24 px-margin-mobile pb-safe min-h-screen flex flex-col">
<!-- Instructional Header -->
<div class="mb-lg">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Enter Tag Code</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Paste or type a NoNumQR public tag link.</p>
</div>
<!-- Bento-style Input Container -->
<div class="flex flex-col gap-md">
<!-- Standard State Input -->
<div class="bg-surface-container-lowest p-lg rounded-xl border border-outline-variant shadow-sm transition-all focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/10">
<label class="font-label-sm text-label-sm text-outline mb-sm block uppercase tracking-wider" for="qr-input">Public Link / Code</label>
<input class="w-full bg-transparent border-none p-0 font-headline-md text-headline-md text-on-surface focus:ring-0 placeholder:text-outline-variant" id="qr-input" placeholder="https://nonumqr.com/p/..." type="text"/>
</div>
<!-- Error State Example (Requested: Invalid QR state) -->
<div class="bg-surface-container-lowest p-lg rounded-xl border-2 border-error shadow-sm bg-error-container/10">
<div class="flex items-center justify-between mb-sm">
<label class="font-label-sm text-label-sm text-error uppercase tracking-wider">Invalid Code</label>
<span class="material-symbols-outlined text-error text-[20px]">error</span>
</div>
<input class="w-full bg-transparent border-none p-0 font-headline-md text-headline-md text-error focus:ring-0" disabled="" type="text" value="nonumqr.com/invalid-tag"/>
<p class="font-body-md text-body-md text-error mt-sm">This tag link is not recognized or has expired.</p>
</div>
<!-- Quick Tips Card -->
<div class="bg-surface-container-high p-md rounded-xl flex items-start gap-md">
<div class="bg-primary/10 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary">info</span>
</div>
<div>
<h3 class="font-title-lg text-title-lg text-primary text-sm mb-xs">Where to find this?</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Check the bottom of your physical NoNumQR sticker or the digital sharing link in your profile.</p>
</div>
</div>
</div>
<!-- Sticky Bottom Action -->
<div class="mt-auto pt-lg pb-md">
<button class="w-full bg-primary text-on-primary font-title-lg text-title-lg py-4 rounded-xl shadow-lg transition-all duration-300 active:scale-[0.98] hover:bg-primary-container hover:text-on-primary-container flex items-center justify-center gap-sm">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full mt-md py-3 font-label-lg text-label-lg text-outline transition-all active:opacity-60">
                Cancel
            </button>
</div>
</main>
<!-- Visual Polish: Soft Ambient Light Effect -->
<div class="fixed top-0 left-0 w-full h-screen pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[30%] bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
<!-- No BottomNavBar as per "Relevance Check" logic (sub-page with back action) -->
<script>
        // Simple micro-interaction for input focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('shadow-md');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('shadow-md');
            });
        });

        // Toggle back button click (Simulated)
        document.querySelector('[data-icon="arrow_back"]').addEventListener('click', () => {
            console.log('Navigating back...');
        });
    </script>
</body></html>
