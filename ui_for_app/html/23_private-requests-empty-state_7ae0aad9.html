                    "primary-container": "#065f46",
                    "secondary": "#006a61",
                    "on-tertiary-fixed": "#00174b",
                    "on-secondary-container": "#006f66",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#89f5e7",
                    "inverse-primary": "#8bd6b6",
                    "primary-fixed": "#a6f2d1",
                    "on-surface": "#111c2d",
                    "surface-container-highest": "#d8e3fb",
                    "on-tertiary-container": "#b5c6ff",
                    "on-tertiary": "#ffffff",
                    "on-background": "#111c2d",
                    "on-primary-container": "#8bd6b7",
                    "on-secondary-fixed-variant": "#005049",
                    "surface-dim": "#cfdaf2",

<style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 glass-panel shadow-sm">
<div class="flex items-center justify-between px-md h-16 w-full max-w-md mx-auto">
<div class="flex items-center gap-md">
<button class="active:scale-95 transition-transform text-on-surface-variant">
<span class="material-symbols-outlined">security</span>
</button>
<h1 class="font-title-lg text-title-lg text-primary">Private Requests</h1>
</div>
<button class="active:scale-95 transition-transform text-on-surface-variant">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<main class="flex-1 w-full max-w-md px-md pt-24 pb-32 flex flex-col items-center">
<!-- Filter Chips Section -->
<div class="w-full flex gap-sm mb-lg overflow-x-auto no-scrollbar">
<button class="px-lg py-sm bg-primary text-on-primary rounded-full font-label-lg text-label-lg transition-all active:scale-95">
                All
            </button>
<button class="px-lg py-sm bg-surface-container text-on-surface-variant rounded-full font-label-lg text-label-lg transition-all active:scale-95">
                Unread
            </button>
<button class="px-lg py-sm bg-surface-container text-on-surface-variant rounded-full font-label-lg text-label-lg transition-all active:scale-95">
                Archived
            </button>
</div>
<!-- Empty State Canvas -->
<div class="flex-1 flex flex-col items-center justify-center text-center py-xl">
<!-- Asymmetric Glassmorphism Circle Layout -->
<div class="relative mb-xl">
<div class="absolute -top-4 -left-4 w-32 h-32 bg-secondary-container/20 rounded-full blur-3xl"></div>
<div class="relative w-48 h-48 rounded-full bg-surface-container-low border border-outline-variant/30 flex items-center justify-center shadow-sm">
<div class="w-32 h-32 rounded-full bg-white flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'wght' 200;">
                            mail_lock
                        </span>
</div>
<!-- Decorative element -->
<div class="absolute -bottom-2 -right-2 w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-md rotate-12">
<span class="material-symbols-outlined text-white text-[24px]">qr_code_2</span>
</div>
</div>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-sm">No Requests Yet</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] leading-relaxed mb-xl">
                When scanners contact you via your QR tags, their messages will appear here.
            </p>
<!-- CTA Button -->
<button class="w-full max-w-[200px] py-md border border-secondary text-secondary rounded-xl font-label-lg text-label-lg hover:bg-secondary/5 active:scale-95 transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined text-[20px]">style</span>
                View My Tags
            </button>
</div>
<!-- Privacy Footer -->
<div class="w-full mt-auto py-lg text-center">
<div class="inline-flex items-center justify-center gap-xs px-md py-sm bg-surface-container-high/50 rounded-full">
<span class="material-symbols-outlined text-primary text-[16px]">verified_user</span>
<span class="font-label-md text-label-md text-on-surface-variant">Your privacy is our priority. Your number stays hidden.</span>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 glass-panel shadow-lg pb-safe">
<div class="flex justify-around items-center h-20 w-full max-w-md mx-auto px-sm">
<!-- Home -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary-container/10 rounded-full transition-colors p-2 active:scale-90 duration-200">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm mt-1">Home</span>
</button>
<!-- Tags -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary-container/10 rounded-full transition-colors p-2 active:scale-90 duration-200">
<span class="material-symbols-outlined">qr_code_2</span>
<span class="font-label-sm text-label-sm mt-1">Tags</span>
</button>
<!-- Requests (ACTIVE) -->
<button class="flex flex-col items-center justify-center text-primary font-bold hover:bg-primary-container/10 rounded-full transition-colors p-2 active:scale-90 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pending_actions</span>
<span class="font-label-sm text-label-sm mt-1">Requests</span>
</button>
<!-- Alerts -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary-container/10 rounded-full transition-colors p-2 active:scale-90 duration-200">
<span class="material-symbols-outlined">notifications</span>
<span class="font-label-sm text-label-sm mt-1">Alerts</span>
</button>
<!-- Account -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary-container/10 rounded-full transition-colors p-2 active:scale-90 duration-200">
<span class="material-symbols-outlined">account_circle</span>
<span class="font-label-sm text-label-sm mt-1">Account</span>
</button>
</div>
</nav>
<script>
        // Simple touch feedback and micro-interactions
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.classList.add('opacity-70');
            });
            btn.addEventListener('touchend', function() {
                this.classList.remove('opacity-70');
            });
        });

        // Floating animation for the central icon
        const iconContainer = document.querySelector('.relative.w-48.h-48');
        if (iconContainer) {
            let start = null;
            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = timestamp - start;
                const y = Math.sin(progress / 1000) * 8;
                iconContainer.style.transform = `translateY(${y}px)`;
                window.requestAnimationFrame(step);
            }
            window.requestAnimationFrame(step);
        }
    </script>
</body></html>
