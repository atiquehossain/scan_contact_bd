<body class="font-body-md text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-xl shadow-sm h-16">
<div class="flex justify-between items-center px-md h-full w-full max-w-lg mx-auto">
<button class="active:scale-95 transition-transform duration-200 hover:bg-surface-variant/50 p-2 rounded-full">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-primary">Account</h1>
<button class="active:scale-95 transition-transform duration-200 hover:bg-surface-variant/50 p-2 rounded-full">
<span class="material-symbols-outlined text-primary" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Canvas -->

<div class="relative">

<div class="absolute bottom-0 right-0 bg-primary w-6 h-6 rounded-full border-2 border-white flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[14px]" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">John Doe</h2>
<p class="font-body-md text-on-surface-variant">+1 (555) 000-0000</p>
<span class="inline-block mt-xs px-sm py-xs bg-secondary-container text-on-secondary-container font-label-sm text-label-sm rounded-full">Owner Account</span>
</div>
</section>
<!-- Privacy Notice Card -->
<section class="bg-surface-container-low border border-outline-variant/20 rounded-xl p-md flex items-start space-x-sm">
<div class="bg-tertiary-container/10 p-2 rounded-lg">
<span class="material-symbols-outlined text-tertiary-container" data-icon="security" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<div class="flex-1">
<p class="font-body-md text-on-surface-variant leading-tight">
                    Your phone number is hidden from scanners by default.
                </p>
<button class="mt-xs text-secondary font-label-md text-label-md active:opacity-70 transition-opacity">Learn more about privacy</button>
</div>
</section>
<!-- Menu Links List -->
<section class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl overflow-hidden custom-shadow-soft">
<div class="divide-y divide-outline-variant/20">
<!-- My QR Tags -->
<button class="w-full flex items-center justify-between p-md hover:bg-surface-variant/30 transition-colors active:scale-[0.98] transition-transform">
<div class="flex items-center space-x-md">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="qr_code_2">qr_code_2</span>

<span class="material-symbols-outlined text-on-surface-variant" data-icon="shopping_bag">shopping_bag</span>

</div>

<div class="flex items-center space-x-md">

</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<!-- Help/Support -->

</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>

<div class="flex items-center space-x-md">
<span class="material-symbols-outlined text-error" data-icon="logout">logout</span>
<span class="font-label-lg text-label-lg text-error">Logout</span>
</div>
<span class="material-symbols-outlined text-error/50">chevron_right</span>
</button>
</div>
</section>

<p class="text-center font-label-sm text-label-sm text-outline-variant/60 py-md">
            NoNumQR v2.4.0 • Encrypted Connection

<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
<span class="font-label-sm text-label-sm">Shop</span>
</a>
<!-- Privacy -->
<a class="flex flex-col items-center justify-center text-on-surface-variant active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="security">security</span>
<span class="font-label-sm text-label-sm">Privacy</span>
</a>
<!-- Account (Active) -->
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined nav-active" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">Account</span>
</a>
</nav>
<script>
        // Simple ripple-like effect for interaction feedback
        document.querySelectorAll('button, a').forEach(elem => {
            elem.addEventListener('click', function(e) {
                const target = e.currentTarget;
                target.classList.add('opacity-80');
                setTimeout(() => target.classList.remove('opacity-80'), 150);
            });
        });
    </script>
</body></html>
