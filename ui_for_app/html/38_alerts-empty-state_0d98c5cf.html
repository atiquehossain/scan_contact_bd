<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#6bd8cb",

                        "surface-dim": "#cfdaf2",
                        "surface-container": "#e7eeff",
                        "on-tertiary-fixed": "#00174b",
                        "secondary-container": "#86f2e4",
                        "on-surface": "#111c2d",
                        "tertiary-fixed": "#dbe1ff",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#3f4944",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#8bd6b6",
                        "on-secondary-fixed-variant": "#005049",
                        "background": "#f9f9ff",
                        "on-secondary-container": "#006f66",
                        "tertiary-fixed-dim": "#b4c5ff",
                        "on-primary-container": "#8bd6b7",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#00513b",
                        "on-primary": "#ffffff",
                        "on-background": "#111c2d",
                        "primary": "#004532",
                        "inverse-on-surface": "#ecf1ff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#003ea8",
                        "inverse-primary": "#8bd6b6",
                        "primary-container": "#065f46",
                        "outline-variant": "#bec9c2",
                        "surface-bright": "#f9f9ff",
                        "surface-container-low": "#f0f3ff",
                        "error": "#ba1a1a",

                        "tertiary-container": "#0049c3",
                        "surface-container-high": "#dee8ff",
                        "inverse-surface": "#263143",
                        "on-tertiary-container": "#b5c6ff",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#1b6b51",
                        "secondary-fixed": "#89f5e7",
                        "tertiary": "#003491",
                        "surface-variant": "#d8e3fb",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#d8e3fb",
                        "primary-fixed": "#a6f2d1",
                        "outline": "#6f7973",
                        "on-secondary-fixed": "#00201d",
                        "secondary": "#006a61"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "lg": "24px",
                        "margin-mobile": "16px",
                        "gutter-mobile": "12px",
                        "xl": "32px",
                        "sm": "8px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-sm": ["Inter"],
                        "title-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-lg": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "label-sm": ["11px", {"lineHeight": "16px", "fontWeight": "600"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],

                        "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}]

                }
            }
        }

<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 glass-panel shadow-sm flex justify-between items-center px-md py-sm">
<div class="flex items-center gap-sm">
<button class="flex items-center justify-center p-xs hover:bg-surface-container-high transition-colors active:scale-95 duration-200 rounded-full">
<span class="material-symbols-outlined text-primary">shield_lock</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Alerts</h1>
</div>
<div class="flex items-center">
<button class="flex items-center justify-center p-xs hover:bg-surface-container-high transition-colors active:scale-95 duration-200 rounded-full">
<span class="material-symbols-outlined text-primary">notifications</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-xl pb-xl">
<!-- Empty State Container -->
<div class="flex flex-col items-center text-center max-w-sm animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Dynamic Background Glow for Visual Interest -->
<div class="relative mb-lg">
<div class="absolute inset-0 bg-primary/5 blur-3xl rounded-full"></div>
<div class="relative bg-surface-container-lowest rounded-full p-xl shadow-sm border border-outline-variant/30">
<span class="material-symbols-outlined text-[64px] text-on-surface-variant/40 leading-none">
                        notifications_off
                    </span>
</div>
</div>
<!-- Content -->
<h2 class="font-title-lg text-title-lg text-on-surface mb-xs">
                No alerts yet
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                Important activity and updates will appear here when they happen.
            </p>
<!-- Action (Secondary Ghost Style) -->
<button class="mt-lg px-md py-sm rounded-full font-label-lg text-label-lg text-secondary hover:bg-secondary/5 transition-colors active:scale-95 duration-150 flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">refresh</span>
                Check for updates
            </button>
</div>
<!-- Asymmetric Decorative Elements (Subtle SaaS style) -->
<div class="fixed top-1/4 -left-20 w-64 h-64 bg-secondary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-1/4 -right-20 w-80 h-80 bg-primary-container/10 rounded-full blur-3xl pointer-events-none"></div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 glass-panel shadow-lg flex justify-around items-center px-margin-mobile pb-safe pt-sm rounded-t-xl">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-container transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-md text-label-md mt-xs">Home</span>
</a>
<!-- Requests -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-container transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">rebase_edit</span>
<span class="font-label-md text-label-md mt-xs">Requests</span>
</a>
<!-- Orders -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-container transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-label-md text-label-md mt-xs">Orders</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-container transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-md text-label-md mt-xs">Settings</span>
</a>
</nav>
<!-- Safe Area Spacer for Bottom Nav -->
<div class="h-20 md:h-0"></div>
<script>
        // Micro-interaction for the check for updates button
        document.querySelector('button').addEventListener('click', function() {
            const icon = this.querySelector('.material-symbols-outlined');
            if (icon && icon.textContent === 'refresh') {
                icon.classList.add('animate-spin');
                setTimeout(() => {
                    icon.classList.remove('animate-spin');
                }, 1000);
            }
        });

        // Simple scroll transparency logic for the glass app bar
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('shadow-md');
                header.style.backgroundColor = 'rgba(255, 255, 255, 0.95)';
            } else {
                header.classList.remove('shadow-md');
                header.style.backgroundColor = 'rgba(255, 255, 255, 0.8)';
            }
        });
    </script>
</body></html>
