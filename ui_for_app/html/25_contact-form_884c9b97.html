<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>NoNumQR - Contact Owner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "error": "#ba1a1a",
                    "background": "#f9f9ff",
                    "secondary": "#006a61",
                    "on-primary-container": "#8bd6b7",
                    "surface-container-highest": "#d8e3fb",
                    "on-primary": "#ffffff",

                    "on-secondary-fixed-variant": "#005049",
                    "tertiary-fixed": "#dbe1ff",

                    "surface-dim": "#cfdaf2",
                    "tertiary": "#003491",
                    "inverse-on-surface": "#ecf1ff",
                    "surface-container": "#e7eeff",
                    "secondary-fixed-dim": "#6bd8cb",
                    "on-secondary-fixed": "#00201d",
                    "primary": "#004532",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#006f66",
                    "error-container": "#ffdad6",
                    "surface-container-high": "#dee8ff",
                    "on-primary-fixed": "#002116",
                    "outline": "#6f7973",
                    "on-tertiary-container": "#b5c6ff",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#3f4944",
                    "inverse-surface": "#263143",
                    "on-surface": "#111c2d",
                    "surface-tint": "#1b6b51",
                    "primary-container": "#065f46",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed-dim": "#b4c5ff",
                    "outline-variant": "#bec9c2",
                    "primary-fixed": "#a6f2d1",
                    "on-tertiary-fixed-variant": "#003ea8",
                    "inverse-primary": "#8bd6b6",
                    "secondary-fixed": "#89f5e7",
                    "on-tertiary-fixed": "#00174b",
                    "surface": "#f9f9ff",
                    "on-primary-fixed-variant": "#00513b",

            "borderRadius": {

                    "xl": "32px",

<style>
        body { font-family: 'Inter', sans-serif; background-color: #f9f9ff; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chip-active {
            background-color: #065f46 !important;
            color: #8bd6b7 !important;
            border-color: #065f46 !important;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-container/80 backdrop-blur-xl shadow-sm flex items-center justify-between px-margin-mobile h-16 w-full">
<div class="flex items-center gap-4">
<button class="transition-all duration-300 active:scale-95 p-2 rounded-full hover:bg-surface-variant/50">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-display-sm text-display-sm font-bold text-primary">NoNumQR</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-primary" data-icon="shield">shield</span>
</div>
</header>
<main class="pt-20 pb-12 px-margin-mobile max-w-lg mx-auto">
<!-- Context Card -->
<section class="mb-md">
<div class="bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/30 shadow-sm flex items-center gap-4">
<div class="w-16 h-16 rounded-lg bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[32px]">directions_car</span>
</div>
<div>
<h2 class="font-title-lg text-title-lg text-on-surface">Car Tag #4829</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Active Vehicle Identification</p>
</div>
</div>
</section>
<!-- Privacy Notice Alert -->
<section class="mb-lg">
<div class="bg-surface-container-low rounded-xl p-md border-l-4 border-primary flex items-start gap-3">
<span class="material-symbols-outlined text-primary mt-0.5" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<div class="space-y-1">
<p class="font-label-lg text-label-lg text-on-surface font-semibold">Privacy Protected</p>
<p class="font-body-md text-body-md text-on-surface-variant">The owner’s phone number is hidden. This QR contains only a public URL for secure, proxied communication.</p>
</div>
</div>
</section>
<!-- Reason Grid -->
<section class="mb-lg">
<label class="font-label-lg text-label-lg text-on-surface-variant mb-3 block">Why are you contacting the owner?</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface font-label-md text-label-md transition-all duration-200 hover:bg-surface-variant/30 active:scale-95" onclick="toggleChip(this)">Vehicle blocking</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface font-label-md text-label-md transition-all duration-200 hover:bg-surface-variant/30 active:scale-95" onclick="toggleChip(this)">Light on</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface font-label-md text-label-md transition-all duration-200 hover:bg-surface-variant/30 active:scale-95" onclick="toggleChip(this)">Vehicle damaged</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface font-label-md text-label-md transition-all duration-200 hover:bg-surface-variant/30 active:scale-95" onclick="toggleChip(this)">Found item</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface font-label-md text-label-md transition-all duration-200 hover:bg-surface-variant/30 active:scale-95" onclick="toggleChip(this)">Delivery contact</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface font-label-md text-label-md transition-all duration-200 hover:bg-surface-variant/30 active:scale-95" onclick="toggleChip(this)">Business inquiry</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface font-label-md text-label-md transition-all duration-200 hover:bg-surface-variant/30 active:scale-95" onclick="toggleChip(this)">Other</button>
</div>
</section>
<!-- Form Fields -->
<section class="space-y-md mb-xl">
<div>
<label class="font-label-lg text-label-lg text-on-surface-variant mb-2 block" for="full-name">Your Name (Optional)</label>
<input class="w-full bg-surface-container-lowest border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md text-body-md" id="full-name" placeholder="John Doe" type="text"/>
</div>
<div>
<label class="font-label-lg text-label-lg text-on-surface-variant mb-2 block" for="message">Message</label>
<textarea class="w-full bg-surface-container-lowest border-outline-variant rounded-lg p-md focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md text-body-md resize-none" id="message" placeholder="Describe the situation..." rows="5"></textarea>
</div>
</section>
<!-- Primary Action -->
<section class="space-y-4">
<button class="w-full bg-primary text-white font-title-lg text-title-lg py-4 rounded-xl shadow-lg transition-all duration-300 active:scale-[0.98] hover:bg-opacity-90 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">send</span>
                Send Private Message
            </button>
<button class="w-full text-error font-label-lg text-label-lg py-2 flex items-center justify-center gap-1 transition-all hover:bg-error/5 rounded-lg">
<span class="material-symbols-outlined text-[18px]">report</span>
                Report Misuse
            </button>
</section>
<!-- Visual Identity Background Element -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary/5 blur-3xl rounded-full translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-96 h-96 bg-secondary/5 blur-3xl rounded-full -translate-x-1/2 translate-y-1/2"></div>
</main>
<script>
        function toggleChip(button) {
            // In a real app, this would handle multi-select or single-select logic
            button.classList.toggle('chip-active');
            
            // Add a little haptic-like animation
            button.classList.add('scale-95');
            setTimeout(() => button.classList.remove('scale-95'), 100);
        }

        // Simple animation on load
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('section');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                card.style.transitionDelay = `${index * 0.1}s`;
                
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 100);
            });
        });
    </script>
</body></html>
