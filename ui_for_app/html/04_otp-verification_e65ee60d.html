<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-input:focus {
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- TopAppBar - Suppressed per rules for transactional screen (OTP) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 h-16 flex items-center px-md justify-between">
<button aria-label="Back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors active:scale-95">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-primary">Verification</h1>
<div class="w-10"></div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-24 pb-12 max-w-md mx-auto w-full">
<!-- Illustration/Branding Anchor -->
<div class="mb-lg text-center">
<div class="w-20 h-20 bg-primary-fixed rounded-full flex items-center justify-center mx-auto mb-md shadow-sm">
<span class="material-symbols-outlined text-primary text-[40px]" style="font-variation-settings: 'FILL' 1;">shield_person</span>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Enter OTP Code</h2>
<p class="font-body-md text-on-surface-variant max-w-[280px] mx-auto">
                We've sent a 6-digit verification code to <span class="font-semibold text-on-surface">+1 ••• ••• 4290</span>
</p>
</div>
<!-- OTP Input Group -->
<div class="w-full mb-lg">
<div class="flex gap-sm justify-between mb-sm" id="otp-container">
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold bg-surface border-outline-variant rounded-lg focus:border-secondary focus:ring-0 transition-all outline-none border" maxlength="1" pattern="\d*" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold bg-surface border-outline-variant rounded-lg focus:border-secondary focus:ring-0 transition-all outline-none border" maxlength="1" pattern="\d*" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold bg-surface border-outline-variant rounded-lg focus:border-secondary focus:ring-0 transition-all outline-none border" maxlength="1" pattern="\d*" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold bg-surface border-outline-variant rounded-lg focus:border-secondary focus:ring-0 transition-all outline-none border" maxlength="1" pattern="\d*" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold bg-surface border-outline-variant rounded-lg focus:border-secondary focus:ring-0 transition-all outline-none border" maxlength="1" pattern="\d*" type="text"/>
<input class="otp-input w-12 h-14 md:w-14 md:h-16 text-center text-headline-md font-bold bg-surface border-outline-variant rounded-lg focus:border-secondary focus:ring-0 transition-all outline-none border" maxlength="1" pattern="\d*" type="text"/>
</div>
<!-- Error State (Hidden by default, shown for demonstration) -->
<div class="flex items-center gap-xs text-error font-label-md mt-sm transition-opacity opacity-0" id="error-message">
<span class="material-symbols-outlined text-[16px]">error</span>
<span>Invalid or expired OTP.</span>
</div>
</div>
<!-- Timer & Resend Action -->
<div class="text-center w-full mb-xl">
<p class="font-body-md text-on-surface-variant mb-sm" id="timer-text">
                Resend code in <span class="font-semibold text-secondary" id="countdown">0:59</span>
</p>
<button class="hidden text-secondary font-label-lg hover:underline transition-all" id="resend-btn">
                Resend code
            </button>
<div class="mt-md">
<button class="text-on-surface-variant font-label-md hover:text-primary transition-colors flex items-center justify-center mx-auto gap-xs">
<span class="material-symbols-outlined text-[18px]">edit</span>
                    Change phone number
                </button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container h-14 rounded-xl font-label-lg text-lg shadow-sm hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" id="verify-btn">
<span>Verify</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</main>
<!-- Visual Polish: Background Gradients -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 blur-[120px] rounded-full"></div>
</div>
<script>
        // OTP Focus Logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Timer Logic
        let timeLeft = 59;
        const countdownEl = document.getElementById('countdown');
        const timerText = document.getElementById('timer-text');
        const resendBtn = document.getElementById('resend-btn');

        const timer = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timer);
                timerText.classList.add('hidden');
                resendBtn.classList.remove('hidden');
            } else {
                timeLeft--;
                countdownEl.textContent = `0:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
            }
        }, 1000);

        // Error Simulation for Demo
        const verifyBtn = document.getElementById('verify-btn');
        const errorMsg = document.getElementById('error-message');
        
        verifyBtn.addEventListener('click', () => {
            // Check if any fields are empty to trigger error state UI
            const isComplete = Array.from(inputs).every(i => i.value.length > 0);
            if (!isComplete) {
                errorMsg.classList.remove('opacity-0');
                inputs.forEach(input => {
                    input.classList.remove('border-outline-variant');
                    input.classList.add('border-error');
                });
                
                // Shake animation
                const container = document.getElementById('otp-container');
                container.classList.add('animate-shake');
                setTimeout(() => container.classList.remove('animate-shake'), 500);
            }
        });

        // Injecting shake keyframes
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
            .animate-shake {
                animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
                animation-iteration-count: 2;
            }
        `;
        document.head.appendChild(style);
    </script>
</body></html>
