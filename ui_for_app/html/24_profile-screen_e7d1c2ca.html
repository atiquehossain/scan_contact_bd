                        "secondary": "#006a61",
                        "on-primary-container": "#8bd6b7",
                        "primary-fixed": "#a6f2d1",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#00174b",
                        "on-surface": "#111c2d",
                        "on-secondary-fixed-variant": "#005049",
                        "on-primary-fixed-variant": "#00513b",
                        "background": "#f9f9ff",
                        "tertiary-fixed-dim": "#b4c5ff",
                        "error": "#ba1a1a",
                        "primary": "#004532",
                        "primary-container": "#065f46",
                        "tertiary": "#003491",
                        "secondary-fixed-dim": "#6bd8cb",
                        "on-secondary-container": "#006f66",
                        "surface-tint": "#1b6b51",
                        "surface": "#f9f9ff",

                    "borderRadius": {

                        "xl": "32px",

                        "sm": "8px",
                        "md": "16px",

                    },
                    "fontFamily": {

                        "body-md": ["Inter"],

<style>
        body {
            background-color: #f9f9ff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-shadow {
            box-shadow: 0px 4px 12px rgba(0,0,0,0.03);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-xl shadow-sm h-16 flex justify-center border-none">
<div class="flex justify-between items-center px-md h-16 w-full max-w-lg mx-auto">
<button aria-label="Go back" class="p-2 active:scale-95 transition-transform duration-200 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-on-surface">Edit Profile</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-lg px-margin-mobile pt-24 pb-32">
<!-- Profile Picture Section -->
<div class="flex flex-col items-center mb-xl">
<div class="relative group">
<div class="w-24 h-24 rounded-full bg-surface-container-high border-4 border-surface overflow-hidden custom-shadow">
<img alt="John Doe" class="w-full h-full object-cover" data-alt="A professional headshot of a middle-aged man with a friendly expression, styled as a modern business owner profile. The lighting is bright and airy, following a minimalist light-mode aesthetic with a clean, out-of-focus background. The image uses a soft, premium photographic style consistent with a high-end SaaS platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDOhjKBPyA5PjartjunJsZZcbk3FDVxAEDTFBDjWRW55qPMB-6wBPZABOgaWtbi76HpXr30DPeG8r7X9QUExrJbgtqtSxXkqRNzYpa-RAA7irkvA4k94oYgLSuD9BuDQgfptdet5AhAW6PHATuE-ge_-KipuirmHnSOPODuCFSJq_DDsZP5n2-KRgeSLApnIlreJBsLs7j7T2iH6SaMrT_gqxm27ZnOc8K-maWNkvTtbqDPpJekEwyX4kIkxRh5BoMXE85sfMvYXYw"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-on-primary p-2 rounded-full shadow-lg active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</button>
</div>
<p class="mt-md font-label-lg text-label-lg text-outline">Owner Account</p>
</div>
<!-- Form Fields -->
<div class="space-y-lg">
<!-- Input: Owner Name -->
<div class="space-y-xs">
<label class="block px-xs font-label-md text-label-md text-on-surface-variant" for="owner_name">Owner Name</label>
<div class="relative group">
<input class="w-full h-14 px-md bg-surface-container-lowest border border-outline-variant rounded-xl font-body-lg text-body-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder-outline-variant" id="owner_name" placeholder="Enter your name" type="text" value="John Doe"/>
</div>
</div>
<!-- Input: Phone Number (Read-only) -->
<div class="space-y-xs">
<label class="block px-xs font-label-md text-label-md text-on-surface-variant">Phone Number</label>
<div class="flex items-center w-full h-14 px-md bg-surface-container-low border border-outline-variant/30 rounded-xl">
<span class="material-symbols-outlined mr-sm text-outline" data-icon="phone">phone</span>
<span class="flex-1 font-body-lg text-body-lg text-outline">
                        +1 (555) 000-0000
                    </span>
<div class="flex items-center gap-1 bg-secondary-container/30 px-2 py-1 rounded-full">
<span class="material-symbols-outlined text-[16px] text-secondary" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-sm text-label-sm text-on-secondary-container">Verified</span>
</div>
</div>
<p class="px-xs font-label-sm text-label-sm text-outline-variant">Phone number is used for account verification and cannot be changed here.</p>
</div>
<!-- Additional Professional Details (Bento-style items) -->
<div class="grid grid-cols-2 gap-md mt-xl">
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant/30 custom-shadow flex flex-col gap-xs">
<span class="material-symbols-outlined text-primary-container" data-icon="qr_code_scanner">qr_code_scanner</span>
<p class="font-label-md text-label-md text-on-surface-variant">Active Tags</p>
<p class="font-headline-md text-headline-md text-primary">12</p>
</div>
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant/30 custom-shadow flex flex-col gap-xs">
<span class="material-symbols-outlined text-secondary" data-icon="shield">shield</span>
<p class="font-label-md text-label-md text-on-surface-variant">Security Level</p>
<p class="font-headline-md text-headline-md text-secondary">High</p>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation / Action Area -->
<!-- Applying Shared Component Style Guidance for BottomNavBar but as a focused action area -->
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center px-4 pb-8 pt-4 bg-surface/80 backdrop-blur-md border-none">
<div class="w-full max-w-lg flex flex-col gap-md">
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-label-lg text-label-lg shadow-lg active:scale-95 transition-all duration-300 flex items-center justify-center gap-sm">
<span>Save Changes</span>
</button>
</div>
</div>
<!-- Micro-interactions Script -->
<script>
        // Simple scale effect for inputs on focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Feedback for save button
        const saveBtn = document.querySelector('button.bg-primary');
        saveBtn.addEventListener('click', () => {
            const originalContent = saveBtn.innerHTML;
            saveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            setTimeout(() => {
                saveBtn.innerHTML = '<span class="material-symbols-outlined" data-icon="check">check</span>';
                setTimeout(() => {
                    saveBtn.innerHTML = originalContent;
                }, 2000);
            }, 1000);
        });
    </script>
</body></html>
