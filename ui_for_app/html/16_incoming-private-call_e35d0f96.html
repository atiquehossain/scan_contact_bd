<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pulse-animation {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.2; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .vibrate {
            animation: vibrate 0.3s linear infinite;
        }
        @keyframes vibrate {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="bg-surface/80 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-sm flex justify-between items-center px-margin-mobile h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary" data-icon="security">security</span>
<h1 class="font-display-sm text-display-sm font-bold text-primary">NoNumQR Owner</h1>
</div>
<button class="text-on-surface-variant hover:bg-surface-variant/50 p-2 rounded-full transition-transform active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-between py-xl px-margin-mobile max-w-lg mx-auto w-full">
<!-- Caller Identity Section -->
<section class="flex flex-col items-center gap-lg mt-8 text-center">
<div class="relative">
<!-- Animated Pulse Rings -->
<div class="absolute inset-0 rounded-full bg-secondary-container pulse-animation scale-125 opacity-20"></div>
<div class="absolute inset-0 rounded-full bg-secondary-container pulse-animation scale-150 opacity-10"></div>
<!-- Avatar -->
<div class="relative w-32 h-32 bg-surface-container-high rounded-full flex items-center justify-center border-4 border-surface-container-lowest shadow-sm overflow-hidden">
<img alt="Private Caller Avatar" class="w-full h-full object-cover" data-alt="A professional, clean studio portrait of a friendly-looking middle-aged man with a kind expression. The lighting is soft and high-key, creating a bright and trustworthy atmosphere. The background is a solid, neutral light grey, maintaining a minimalist and focused aesthetic. The image is framed as a circular profile picture, conveying a sense of premium professional service." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCADe4RH0f7NtFIqR-A4irwHlagOZazfa5NGgMfeGibsHG5zNK2tqC4gk_J749moLRnmOyPH8-3WB5PvjB04NuQfo9lMwMBmcF5J8ZNGqw6GVkYshlP-QQAh2qK6fn9_zq3zjHJVfN4yhxrl5ki4PozNa24Wn6q61Ysa71jSDhmonAPxE6qi44DiuvnA3UQsKq_oSnan7rbZLQkE202evz5avDh0NISp7G34sXRm4BI1H4G6XhNqICvsAlxCr6zzTjjZP7k6sMau8s"/>
<div class="absolute inset-0 bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="shield_person">shield_person</span>
</div>
</div>
</div>
<div class="space-y-xs">
<p class="font-label-lg text-label-lg text-secondary uppercase tracking-widest">Incoming Call</p>
<h2 class="font-headline-lg text-headline-lg text-on-surface">Private Caller</h2>
<div class="flex items-center justify-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-sm" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-md text-label-md">Verified NoNumQR Identity</span>
</div>
</div>
</section>
<!-- Context Card -->
<section class="w-full bg-surface-container-lowest rounded-xl p-lg border border-outline-variant/30 shadow-sm space-y-md">
<div class="flex items-start justify-between">
<div class="space-y-1">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase">Linked Asset</p>
<h3 class="font-title-lg text-title-lg text-primary">Toyota Corolla (A-123)</h3>
</div>
<div class="bg-primary-fixed text-on-primary-fixed px-3 py-1 rounded-full font-label-sm text-label-sm">
                    Active Tag
                </div>
</div>
<div class="h-px bg-outline-variant/20"></div>
<div class="space-y-2">
<div class="flex items-center gap-sm text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="report_problem">report_problem</span>
<p class="font-body-md text-body-md">Reported Reason:</p>
</div>
<div class="bg-error-container/20 text-on-error-container p-md rounded-lg flex items-center gap-md">
<span class="material-symbols-outlined text-error" data-icon="block">block</span>
<p class="font-title-lg text-title-lg font-bold">Vehicle Blocking</p>
</div>
</div>
</section>
<!-- Privacy Footer Text -->
<section class="w-full text-center space-y-xl">
<div class="flex items-center justify-center gap-sm bg-surface-container-low py-sm px-md rounded-full border border-outline-variant/10">
<span class="material-symbols-outlined text-secondary" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<p class="font-body-md text-body-md text-on-surface-variant">Your phone number is not shown to the scanner.</p>
</div>
<!-- Action Buttons -->
<div class="flex gap-lg w-full">
<!-- Decline Button -->
<button class="flex-1 flex flex-col items-center gap-sm group" onclick="handleCall('declined')">
<div class="w-20 h-20 rounded-full bg-error flex items-center justify-center text-on-error shadow-lg transition-transform active:scale-90 duration-200 group-hover:brightness-110">
<span class="material-symbols-outlined text-4xl" data-icon="call_end">call_end</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface-variant">Decline</span>
</button>
<!-- Accept Button -->
<button class="flex-1 flex flex-col items-center gap-sm group" onclick="handleCall('accepted')">
<div class="w-20 h-20 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container shadow-lg transition-transform active:scale-90 duration-200 group-hover:brightness-110 vibrate">
<span class="material-symbols-outlined text-4xl" data-icon="call">call</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface-variant">Accept</span>
</button>
</div>
</section>
</main>
<!-- Success/Interaction Overlay (Hidden by default) -->
<div class="fixed inset-0 bg-surface/90 backdrop-blur-md z-[100] hidden flex-col items-center justify-center p-xl text-center" id="callOverlay">
<div class="w-24 h-24 rounded-full flex items-center justify-center mb-lg" id="overlayIcon"></div>
<h2 class="font-headline-lg text-headline-lg mb-sm" id="overlayTitle"></h2>
<p class="font-body-lg text-body-lg text-on-surface-variant" id="overlayMessage"></p>
<button class="mt-xl text-primary font-label-lg uppercase tracking-wider" onclick="resetCall()">Back to Dashboard</button>
</div>
<script>
        function handleCall(action) {
            const overlay = document.getElementById('callOverlay');
            const icon = document.getElementById('overlayIcon');
            const title = document.getElementById('overlayTitle');
            const message = document.getElementById('overlayMessage');

            overlay.classList.remove('hidden');
            overlay.classList.add('flex');

            if (action === 'accepted') {
                icon.className = "w-24 h-24 rounded-full bg-primary-container flex items-center justify-center mb-lg text-on-primary-container";
                icon.innerHTML = '<span class="material-symbols-outlined text-5xl" data-icon="call">call</span>';
                title.innerText = "Connecting...";
                message.innerText = "Securing your private bridge to the scanner.";
            } else {
                icon.className = "w-24 h-24 rounded-full bg-error-container flex items-center justify-center mb-lg text-on-error-container";
                icon.innerHTML = '<span class="material-symbols-outlined text-5xl" data-icon="call_end">call_end</span>';
                title.innerText = "Call Declined";
                message.innerText = "The caller has been notified that you are unavailable.";
            }
        }

        function resetCall() {
            document.getElementById('callOverlay').classList.add('hidden');
            document.getElementById('callOverlay').classList.remove('flex');
        }
    </script>
</body></html>
