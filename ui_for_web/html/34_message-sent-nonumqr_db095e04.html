<!DOCTYPE html>

<html class="light" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .success-check-anim {
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: confettiFly 2.5s ease-out forwards;
        }
        @keyframes confettiFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tw-translate-x), var(--tw-translate-y)) scale(0); opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="bg-surface-container-lowest flex items-center justify-between px-margin-mobile w-full h-16 shadow-sm sticky top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary font-headline-md text-headline-md" data-icon="qr_code_2">qr_code_2</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary">NoNumQR</h1>
</div>
<button class="transition-all duration-200 active:scale-95 text-on-surface-variant hover:bg-surface-container p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-stack-lg relative overflow-hidden">
<!-- Background Atmospheric Element -->
<div class="absolute inset-0 pointer-events-none opacity-20 overflow-hidden">
<div class="absolute -top-1/4 -right-1/4 w-96 h-96 bg-primary-fixed rounded-full blur-[100px]"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-96 h-96 bg-secondary-fixed rounded-full blur-[100px]"></div>
</div>
<!-- Success Success Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-stack-lg shadow-[0_4px_20px_rgba(15,23,42,0.05)] relative z-10 flex flex-col items-center text-center">
<!-- Success Icon Section -->
<div class="relative mb-stack-lg" id="success-icon-container">
<div class="w-24 h-24 bg-secondary-container rounded-full flex items-center justify-center success-check-anim">
<span class="material-symbols-outlined text-[48px] text-on-secondary-container" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Content -->
<div class="space-y-stack-sm mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-ink-slate">Message Sent!</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Your private message has been delivered to the owner.</p>
</div>
<!-- CTA Section -->
<div class="w-full space-y-stack-md">
<button class="w-full py-4 bg-[#0D9488] text-white font-label-lg text-label-lg rounded-lg shadow-sm transition-all duration-200 active:scale-[0.98] hover:brightness-110 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="forum">forum</span>
                    Continue Conversation
                </button>
<div class="flex items-center justify-center gap-2 pt-2">
<span class="material-symbols-outlined text-[18px] text-secondary" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Your identity remains private</p>
</div>
</div>
<!-- Delivery Details (Secondary Info) -->
<div class="mt-stack-lg pt-stack-md border-t border-outline-variant w-full">
<div class="flex justify-between items-center text-on-surface-variant px-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
<span class="font-label-sm text-label-sm">Encrypted</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="schedule">schedule</span>
<span class="font-label-sm text-label-sm">Sent 2s ago</span>
</div>
</div>
</div>
</div>
<!-- Additional Actions / Support -->
<div class="mt-stack-lg flex flex-col items-center gap-stack-md z-10">
<button class="font-label-lg text-label-lg text-primary hover:underline transition-all">
                Close and Return to Home
            </button>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface border-t border-outline-variant flex flex-col items-center gap-stack-sm py-stack-lg px-margin-mobile w-full text-center">
<div class="flex flex-wrap justify-center gap-stack-md mb-2">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Report Abuse</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">How it Works</a>
</div>
<div class="font-label-lg text-label-lg text-ink-slate">NoNumQR</div>
<p class="font-label-sm text-label-sm text-secondary">© 2024 NoNumQR. Privacy First.</p>
</footer>
<script>
        // Micro-interaction: Confetti Effect on Load
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('success-icon-container');
            const colors = ['#0D9488', '#a6f2d1', '#006a61', '#89f5e7'];
            
            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                
                // Randomize trajectory
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 80;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                confetti.style.setProperty('--tw-translate-x', `${tx}px`);
                confetti.style.setProperty('--tw-translate-y', `${ty}px`);
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = '50%';
                confetti.style.top = '50%';
                confetti.style.animationDelay = `${Math.random() * 0.2}s`;
                
                container.appendChild(confetti);
            }
        });
    </script>
</body></html>
