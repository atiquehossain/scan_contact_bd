<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-container/80 backdrop-blur-xl border-b border-outline-variant/30">
<div class="flex items-center justify-between px-md h-16 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-surface-variant/50 transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-on-surface">Profile Setup</h1>
</div>
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">
                NoNumQR Owner
            </div>
</div>
</header>
<main class="flex-grow pt-24 pb-32 px-margin-mobile max-w-md mx-auto w-full">
<!-- Hero Section -->
<div class="mb-xl text-center">
<div class="w-20 h-20 bg-primary-fixed rounded-full flex items-center justify-center mx-auto mb-md shadow-lg">
<span class="material-symbols-outlined text-primary text-[40px]" data-icon="person_add">person_add</span>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Welcome, Owner</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Let's personalize your dashboard and secure your identity.</p>
</div>
<!-- Form Section -->
<div class="space-y-lg">
<!-- Owner Name Input -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="owner-name">Owner Name</label>
<div class="relative group">
<input class="w-full h-14 px-md bg-surface-container-lowest border border-outline-variant rounded-xl font-body-lg text-body-lg focus:outline-none focus:border-secondary transition-all form-focus-ring" id="owner-name" placeholder="Enter your full name" type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="badge">badge</span>
</div>
</div>
<!-- Profile Note Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center ml-1">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="profile-note">Profile Note</label>
<span class="font-label-sm text-label-sm text-outline">Optional</span>
</div>
<div class="relative group">
<textarea class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-xl font-body-md text-body-md focus:outline-none focus:border-secondary transition-all form-focus-ring resize-none" id="profile-note" placeholder="e.g. Leave packages at the side gate" rows="3"></textarea>
</div>
</div>
<!-- Privacy Reminder Card -->
<div class="p-md bg-secondary-container/20 rounded-xl border border-secondary-container flex gap-md items-start shadow-sm">
<div class="p-2 bg-secondary/10 rounded-lg">
<span class="material-symbols-outlined text-secondary" data-icon="shield_lock" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
<div class="space-y-xs">
<p class="font-label-lg text-label-lg text-on-secondary-container">Privacy First</p>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                        Public scanner pages will not show your phone number. We prioritize your professional security at every step.
                    </p>
</div>
</div>
</div>
<!-- Decorative Illustration Element -->
<div class="mt-xl opacity-40 grayscale pointer-events-none select-none overflow-hidden rounded-2xl h-32 relative">
<img alt="Privacy background" class="w-full h-full object-cover" data-alt="A sophisticated digital abstract pattern of interconnected nodes and lines, representing a secure network of information. The colors are dominated by deep emerald greens and muted teal tones, creating a sense of calm and technological reliability. Soft light glows from certain intersections, suggesting active, safe communication within a modern minimalist aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnKKiLn9-JELFDREvDA_Hs79Oawbh4ibA3Qk6nfBIFFyy80LddwJ7JTrMzNOheWFJyt7KupOAMiRL8CMjM3z7Q8wA960NA-Tc9MmofzfCEqLfpOJ2CpoIJjvvEy8Pq_48lUpp70qvNvjYlbZDOZ6W-RBsxHzwzLZck3abiHlU_PMTUp_ZMxhnL5SgqqNPBVHfOUbVYXkrYkXUK5C7w8J9gIbTVTYnsNEbP1exxat6giwHJWxAuFaB_QREv4ZCAWSVoPxRQ-EXcExQ"/>

</div>
</main>
<!-- Fixed Action Button / Primary Button -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-surface/90 backdrop-blur-lg border-t border-outline-variant/10 md:static md:bg-transparent md:border-none md:mt-lg">
<div class="max-w-md mx-auto">
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-label-lg text-label-lg flex items-center justify-center gap-2 shadow-lg hover:bg-primary-container transition-all active:scale-[0.98]" id="continue-btn">
                Continue
                <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<!-- BottomNavBar (Hidden on this transactional screen as per The Destination Rule) -->
<!-- The prompt defines this as an onboarding/setup screen, so navigation shell is suppressed -->
<script>
        // Simple micro-interaction for the button
        const btn = document.getElementById('continue-btn');
        btn.addEventListener('click', () => {
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined" data-icon="progress_activity">progress_activity</span> Processing...`;
            btn.disabled = true;
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-80');
                // Navigation logic would go here
            }, 1500);
        });

        // Soft shimmer on the text fields on page load
        document.querySelectorAll('input, textarea').forEach((el, index) => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(10px)';
            setTimeout(() => {
                el.style.transition = 'all 0.4s ease-out';
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            }, 100 * (index + 1));
        });
    </script>
