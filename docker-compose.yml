services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scancontact}
      POSTGRES_USER: ${POSTGRES_USER:-scancontact}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scancontact_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scancontact} -d ${POSTGRES_DB:-scancontact}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["extras"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    profiles: ["dev-tools"]
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scancontact}:${POSTGRES_PASSWORD:-scancontact_local_password}@postgres:5432/${POSTGRES_DB:-scancontact}?schema=public
      REDIS_URL: ${API_REDIS_URL:-}
      NODE_OPTIONS: ${API_NODE_OPTIONS:---max-old-space-size=384}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api_uploads:/app/apps/api/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    profiles: ["extras"]
    env_file:
      - apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    build:
      context: .
      dockerfile: infra/caddy/Dockerfile
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-ScanContact BD}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_API_URL: ${STATIC_NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "${WEB_HTTP_PORT:-3000}:80"
      - "${WEB_HTTPS_PORT:-3443}:443"
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/admin/login/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  api_uploads:
  caddy_data:
  caddy_config:
