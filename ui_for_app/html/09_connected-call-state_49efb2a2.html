<body class="bg-surface font-body-md text-on-surface flex flex-col min-h-screen">

<div class="flex items-center">
<button class="p-2 rounded-full hover:bg-surface-variant/50 transition-transform active:scale-95 duration-150">

<div class="flex flex-col items-center gap-xs mt-lg">

<img alt="Private Caller Avatar" class="w-full h-full object-cover opacity-80" data-alt="A sophisticated, minimalist abstract digital art piece depicting a human silhouette in soft, ethereal lighting. The aesthetic uses a palette of muted slates and warm whites, creating a professional yet anonymous persona. High-end lighting illuminates the edges, suggesting a premium and secure digital atmosphere for a private communication application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRTftMj5Bjoh68b4K4O_SRXDn5Re0LWN7TYpWVbfjd5chEclhwSE3r43yevVMny-Vr49mXdRQs3wMz45C6g4EoUIB-9iUVFHU2WKBa-qXWmvf-3f1dOnq0ro7q8yNH5AEXe4aRciS0wO2F4k5kUQVysjC_vIjVuz5_RUAW5elWfofAVKwIGz5KgNa82aRINMXX3j7DCoIEzvPVUopNKjfXkwf5lMrF2LRLDsAIn4cY64Z77aeIElYYTgydgJO1e0PT3xW0LBf_6AA"/>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface">Private Caller</h2>
</div>
</section>
<!-- Context Card -->

</div>
</div>
</section>

</button>

                </p>

<!-- Bottom Navigation Bar (Hidden on Call Screen) -->
<!-- Suppressed per UX guidelines for task-focused context -->
<script>
        // Simple Call Timer
        let seconds = 0;
        const timerElement = document.getElementById('call-timer');
        
        setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            timerElement.textContent = `${mins}:${secs}`;
        }, 1000);

        // Control Toggle Logic
        function toggleControl(btn) {
            const isActive = btn.classList.contains('bg-secondary-container');
            if (isActive) {
                btn.classList.remove('bg-secondary-container', 'text-on-secondary-container');
                btn.classList.add('border-outline-variant');
                btn.querySelector('span').classList.remove('text-on-secondary-container');
                btn.querySelector('span').classList.add('text-on-surface-variant');
            } else {
                btn.classList.add('bg-secondary-container', 'text-on-secondary-container');
                btn.classList.remove('border-outline-variant');
                btn.querySelector('span').classList.add('text-on-secondary-container');
                btn.querySelector('span').classList.remove('text-on-surface-variant');
            }
        }
    </script>
